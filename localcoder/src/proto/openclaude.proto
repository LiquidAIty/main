syntax = "proto3";

package openclaude.v1;

// Main Agent Service
service AgentService {
  // Bidirectional stream: client sends tasks and answers to agent prompts,
  // server streams text tokens, tool states, and requests permissions.
  rpc Chat(stream ClientMessage) returns (stream ServerMessage);
}

// ---------------------------------------------------------
// MESSAGES FROM CLIENT (Input)
// ---------------------------------------------------------
message ClientMessage {
  oneof payload {
    // 1. Initial request (first message in the stream)
    ChatRequest request = 2;

    // 2. User response to an agent prompt (e.g., command confirmation)
    UserInput input = 3;

    // 3. Interrupt signal (if the user clicks "Stop generation")
    CancelSignal cancel = 4;
  }
}

message ChatRequest {
  string message = 1;
  string working_directory = 2; // Where the agent should execute commands
  reserved 3;                   // Reserved to prevent accidental reuse
  optional string model = 4;
  string session_id = 5;        // Non-empty = cross-stream session persistence
  // Structural saved-card configuration bridged into this turn's native
  // agent pool (see AgentDefinitionConfig). Empty = no extra agents.
  repeated AgentDefinitionConfig agent_definitions = 6;
  // The saved OpenClaude Chat parent card's visible prompt content, verbatim.
  // Composed with (never replacing) the locked vendored base system prompt by
  // QueryEngine's own existing appendSystemPrompt mechanism. Empty = the
  // vendored default system prompt is used alone, unappended.
  optional string append_system_prompt = 7;
  // The PARENT session's MCP tool grant — the saved parent card's Tools
  // selection, enforced by filtering the parent tool pool. Empty = full pool
  // (back-compat). Child agents still resolve their own allowed_tools against
  // the full server-lifetime pool.
  repeated string parent_allowed_mcp_tools = 8;
  // The PARENT session's NATIVE tool grant — the saved parent card's assigned
  // native tools, filtered BEFORE provider schema serialization so the parent
  // model never pays tokens for tool schemas it may not use. Empty = full
  // native pool (back-compat for callers whose cards declare no native list).
  // Named child agents are unaffected: they assemble their own pool from the
  // full registry and their own allowed_tools (AgentTool.tsx workerTools).
  repeated string parent_allowed_native_tools = 9;
}

// Structural saved-card configuration only — never graph data, conversation
// text, or backend-invented semantic instructions. The saved card's own
// visible prompt and visible tool grants remain the sole semantic authority.
message AgentDefinitionConfig {
  string agent_type = 1;              // subagent_type value that selects this card
  string card_id = 2;                 // saved card id, for diagnostics only
  string runtime_binding = 3;         // e.g. "hermes_steward"
  string system_prompt = 4;           // saved card's visible prompt, verbatim
  repeated string allowed_tools = 5;  // saved card's visible tool grants
  bool context_mode_inherit_parent = 6; // true = live inherited-context fork
  string when_to_use = 7;             // parent-facing capability line (backend-authored)
  optional string model = 8;          // saved card model id; empty = inherit parent
  // Saved card ids this child may run through the card-run control tool —
  // resolved by the backend from the card's persisted ORANGE (direct) edges.
  // Empty = the child may run only its own bound card (legacy doorway).
  repeated string allowed_card_run_ids = 9;
}

message UserInput {
  string reply = 1;       // Text response (e.g., "y", "no", or clarification)
  string prompt_id = 2;   // ID of the prompt we are responding to
}

message CancelSignal {
  string reason = 1;
}

// ---------------------------------------------------------
// MESSAGES FROM SERVER (Output / Events)
// ---------------------------------------------------------
message ServerMessage {
  // Using oneof guarantees that only one type of event arrives at a time
  oneof event {
    TextChunk text_chunk = 1;          // Chunk of text from LLM
    ToolCallStart tool_start = 2;      // Agent started using a tool
    ToolCallResult tool_result = 3;    // Tool returned a result
    ActionRequired action_required = 4;// Agent requires human intervention
    FinalResponse done = 5;            // Generation successfully completed
    ErrorResponse error = 6;           // A critical error occurred
    ProgressEvent progress = 7;        // Native tool/subagent progress
  }
}

// Stream text chunk
message TextChunk {
  string text = 1;
}

// Agent decided to use a tool (bash, read_file, etc.)
message ToolCallStart {
  string tool_name = 1;
  string arguments_json = 2; // Arguments in JSON format
  string tool_use_id = 3;    // Correlation ID matching ToolCallResult
  // Invoking agent identity: the doorway child's agent_type when a subagent
  // made the call, empty for the parent session. Real engine context
  // (canUseTool's context.agentType), never inferred from timing or text.
  string agent_type = 4;
}

// Result of tool execution
message ToolCallResult {
  string tool_name = 1;
  string output = 2;      // stdout/stderr or file contents
  bool is_error = 3;      // Did the command itself fail
  string tool_use_id = 4; // Correlation ID matching ToolCallStart
}

// Agent paused work and is waiting for user decision
message ActionRequired {
  string prompt_id = 1;        // Client must return this ID in UserInput
  string question = 2;         // Question text (e.g., "Execute 'rm -rf /'?")
  enum ActionType {
    CONFIRM_COMMAND = 0;       // Yes/No
    REQUEST_INFORMATION = 1;   // Text input
  }
  ActionType type = 3;
}

// Final statistics
message FinalResponse {
  string full_text = 1;     // The entire generated text
  int32 prompt_tokens = 2;
  int32 completion_tokens = 3;
  // Engine-truth per-component context accounting for this turn (compact JSON
  // from the engine's own analyzeContextUsage: system prompt sections, per-tool
  // schemas, MCP tools, agents, message breakdown). Empty when unavailable —
  // never fabricated.
  string context_breakdown_json = 4;
  // Honest usage semantics: prompt_tokens/completion_tokens are provider-real
  // ONLY when usage_available is true. usage_source names where they came from
  // ('result_usage' | 'model_usage' | 'unavailable'). total_cost_usd is
  // reported only when positive; 0 = unavailable.
  bool usage_available = 5;
  string usage_source = 6;
  double total_cost_usd = 7;
}

message ErrorResponse {
  string message = 1;
  string code = 2;
}

// Native QueryEngine progress. data_json is the exact structured progress
// payload; ids preserve the parent/child tool relationship.
message ProgressEvent {
  string tool_use_id = 1;
  string parent_tool_use_id = 2;
  string data_json = 3;
}
