name: Kaiwiki site preview

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - work
    paths:
      - 'kaiwiki-site/**'
      - '.github/workflows/kaiwiki-site-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: kaiwiki-site-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build static site
        working-directory: kaiwiki-site
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: kaiwiki-site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
