<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1280" viewBox="0 0 1800 1280" role="img" aria-labelledby="title desc">
  <title id="title">LiquidAIty universal agent-card control system</title>
  <desc id="desc">A three-layer architecture showing You and Sol receiving carefully curated executive context, a universal path from repositories and concepts through an agent template into model-powered cards and purpose-built Agent Canvas dashboards, and four separate graph authorities including executable AgentGraph context containing prompts, graph queries, Cypher, and mathematical scripts.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07121d"/>
      <stop offset="1" stop-color="#03080f"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b2539"/>
      <stop offset="0.5" stop-color="#111d2b"/>
      <stop offset="1" stop-color="#0b2539"/>
    </linearGradient>
    <filter id="glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-cyan" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#48dff2"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#ffad42"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#87df55"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#cb7cff"/>
    </marker>
    <style>
      .title { font: 700 42px "Segoe UI", Arial, sans-serif; fill: #f5f8fb; letter-spacing: .5px; }
      .subtitle { font: 400 18px "Segoe UI", Arial, sans-serif; fill: #a9bdca; }
      .section { font: 700 20px "Segoe UI", Arial, sans-serif; fill: #dceaf2; letter-spacing: 1.8px; }
      .node-title { font: 700 25px "Segoe UI", Arial, sans-serif; fill: #f4f8fb; }
      .node-sub { font: 600 16px "Segoe UI", Arial, sans-serif; fill: #bdd0db; }
      .body { font: 400 15px "Segoe UI", Arial, sans-serif; fill: #d1dde5; }
      .small { font: 400 13px "Segoe UI", Arial, sans-serif; fill: #a9bdca; }
      .tiny { font: 400 12px "Segoe UI", Arial, sans-serif; fill: #93aab8; }
      .label { font: 600 14px "Segoe UI", Arial, sans-serif; fill: #eaf3f7; }
      .cyan { fill: #54e5f4; }
      .orange { fill: #ffb44d; }
      .purple { fill: #d28aff; }
      .green { fill: #91e65d; }
      .pink { fill: #ff8fb1; }
      .panel { fill: #09131d; stroke: #274152; stroke-width: 1.4; }
      .panel-cyan { fill: #081a26; stroke: #48dff2; stroke-width: 2; }
      .panel-purple { fill: #181022; stroke: #bd70f2; stroke-width: 2; }
      .panel-orange { fill: #1d1508; stroke: #f5a22d; stroke-width: 2; }
      .panel-green { fill: #101c0c; stroke: #78cf46; stroke-width: 2; }
      .panel-pink { fill: #211019; stroke: #ef78a0; stroke-width: 2; }
      .lane { fill: #07111a; stroke: #19384b; stroke-width: 1.5; }
      .rule { stroke: #274152; stroke-width: 1; }
      .flow-cyan { fill: none; stroke: #48dff2; stroke-width: 3; marker-end: url(#arrow-cyan); }
      .flow-orange { fill: none; stroke: #ffad42; stroke-width: 3; marker-end: url(#arrow-orange); }
      .flow-green { fill: none; stroke: #87df55; stroke-width: 3; marker-end: url(#arrow-green); }
      .flow-purple { fill: none; stroke: #cb7cff; stroke-width: 3; marker-end: url(#arrow-purple); }
      .query-cyan { fill: none; stroke: #48dff2; stroke-width: 2.5; stroke-dasharray: 9 7; marker-end: url(#arrow-cyan); }
      .query-purple { fill: none; stroke: #cb7cff; stroke-width: 2.5; stroke-dasharray: 9 7; marker-end: url(#arrow-purple); }
      .query-orange { fill: none; stroke: #ffad42; stroke-width: 2.5; stroke-dasharray: 9 7; marker-end: url(#arrow-orange); }
      .query-green { fill: none; stroke: #87df55; stroke-width: 2.5; stroke-dasharray: 9 7; marker-end: url(#arrow-green); }
    </style>
  </defs>

  <rect width="1800" height="1280" fill="url(#bg)"/>
  <rect x="18" y="18" width="1764" height="82" rx="18" fill="url(#header)" stroke="#1c5371" stroke-width="1.5"/>
  <text x="900" y="61" text-anchor="middle" class="title">LiquidAIty — Universal Agent-Card Control System</text>
  <text x="900" y="87" text-anchor="middle" class="subtitle">Cards make any model, repository, concept, dataset, simulation, or software system into a connected worker</text>

  <rect x="180" y="116" width="1440" height="55" rx="14" fill="#251a08" stroke="#ffad42" stroke-width="2"/>
  <text x="900" y="140" text-anchor="middle" class="label orange">FIRST REAL CODER VERTICAL SLICE</text>
  <text x="900" y="160" text-anchor="middle" class="body">Build the universal Agent-from-Template path — prove it by making the Trading Agent and its Agent Canvas real</text>

  <!-- Executive lane -->
  <rect x="18" y="190" width="1764" height="268" rx="18" class="lane"/>
  <text x="42" y="222" class="section">1  EXECUTIVE CONTROL — THE BOSS GETS CURATED INFORMATION</text>

  <rect x="45" y="258" width="180" height="130" rx="16" class="panel-cyan" filter="url(#glow-cyan)"/>
  <text x="135" y="298" text-anchor="middle" class="node-title">You</text>
  <text x="135" y="329" text-anchor="middle" class="node-sub cyan">Owner</text>
  <text x="135" y="356" text-anchor="middle" class="body">direction</text>
  <text x="135" y="377" text-anchor="middle" class="body">approval</text>

  <rect x="300" y="236" width="325" height="176" rx="18" class="panel-cyan" filter="url(#glow-cyan)"/>
  <text x="462" y="278" text-anchor="middle" class="node-title">Main / Sol</text>
  <text x="462" y="308" text-anchor="middle" class="node-sub cyan">Executive intelligence</text>
  <text x="325" y="340" class="body">• reasons with you</text>
  <text x="325" y="365" class="body">• designs cards and teams</text>
  <text x="325" y="390" class="body">• decides and approves work</text>

  <path d="M225 315 L294 315" class="flow-cyan"/>
  <path d="M300 351 L231 351" class="flow-cyan"/>

  <rect x="705" y="226" width="420" height="195" rx="18" class="panel"/>
  <text x="915" y="265" text-anchor="middle" class="node-title">Sol’s Executive Context</text>
  <text x="915" y="293" text-anchor="middle" class="node-sub cyan">carefully curated, never the raw firehose</text>
  <line x1="730" y1="311" x2="1100" y2="311" class="rule"/>
  <text x="735" y="340" class="body">decision or requested approval</text>
  <text x="735" y="366" class="body">sourced evidence + uncertainty</text>
  <text x="735" y="392" class="body">numerical views + risks + drill-down refs</text>
  <path d="M705 329 L632 329" class="flow-cyan"/>

  <rect x="1190" y="242" width="250" height="150" rx="17" class="panel-purple"/>
  <text x="1315" y="282" text-anchor="middle" class="node-title">Hermes</text>
  <text x="1315" y="312" text-anchor="middle" class="node-sub purple">Deep-work assistant</text>
  <text x="1215" y="342" class="body">researches, finds context,</text>
  <text x="1215" y="365" class="body">improves prompts and cards</text>

  <rect x="1490" y="242" width="260" height="150" rx="17" class="panel-green"/>
  <text x="1620" y="282" text-anchor="middle" class="node-title">Mag One</text>
  <text x="1620" y="312" text-anchor="middle" class="node-sub green">Multi-agent coordinator</text>
  <text x="1515" y="342" class="body">runs selected connected cards</text>
  <text x="1515" y="365" class="body">and returns coordinated work</text>

  <path d="M625 276 C800 184,1050 184,1182 276" class="flow-purple"/>
  <path d="M625 389 C910 465,1260 455,1482 347" class="flow-green"/>
  <path d="M1188 365 C1160 404,1135 408,1125 385" class="flow-purple"/>
  <text x="1010" y="194" class="small purple">research / card design request</text>
  <text x="1245" y="437" class="small green">approved team mission</text>

  <!-- Universal agent-card path -->
  <rect x="18" y="478" width="1764" height="338" rx="18" class="lane"/>
  <text x="42" y="510" class="section">2  UNIVERSAL AGENT-CARD PATH — ANYTHING CAN BECOME A WORKER AND A PURPOSE-BUILT UI</text>

  <rect x="45" y="547" width="250" height="215" rx="16" class="panel"/>
  <text x="170" y="584" text-anchor="middle" class="node-title">Any Capability</text>
  <text x="70" y="620" class="body">GitHub repository</text>
  <text x="70" y="647" class="body">custom code or software</text>
  <text x="70" y="674" class="body">concept or domain</text>
  <text x="70" y="701" class="body">data / API / time series</text>
  <text x="70" y="728" class="body">simulation / ML system</text>

  <rect x="350" y="531" width="365" height="247" rx="17" class="panel-orange"/>
  <text x="532" y="570" text-anchor="middle" class="node-title">Agent-from-Template</text>
  <text x="532" y="599" text-anchor="middle" class="node-sub orange">Coder implements the real runtime</text>
  <line x1="375" y1="618" x2="690" y2="618" class="rule"/>
  <text x="379" y="647" class="body">model + provider</text>
  <text x="379" y="673" class="body">prompt + role</text>
  <text x="379" y="699" class="body">tools + permissions</text>
  <text x="540" y="647" class="body">graph grants</text>
  <text x="540" y="673" class="body">runtime adapter</text>
  <text x="540" y="699" class="body">Agent Canvas route</text>
  <rect x="375" y="723" width="315" height="35" rx="9" fill="#302008" stroke="#ffad42"/>
  <text x="532" y="746" text-anchor="middle" class="label orange">Trading Agent = first proof</text>

  <path d="M295 654 L340 654" class="flow-orange"/>
  <path d="M462 412 L462 522" class="flow-orange"/>
  <text x="475" y="473" class="small orange">Sol-approved Coder job</text>

  <rect x="770" y="531" width="280" height="247" rx="17" class="panel-cyan"/>
  <text x="910" y="570" text-anchor="middle" class="node-title">Saved Agent Card</text>
  <text x="910" y="598" text-anchor="middle" class="node-sub cyan">the universal capability object</text>
  <line x1="795" y1="618" x2="1025" y2="618" class="rule"/>
  <text x="795" y="647" class="body">assigned intelligence</text>
  <text x="795" y="673" class="body">real tools and data</text>
  <text x="795" y="699" class="body">native graph access</text>
  <text x="795" y="725" class="body">saved bus connections</text>
  <text x="795" y="751" class="body">purpose-built interface</text>

  <path d="M715 654 L760 654" class="flow-orange"/>

  <rect x="1105" y="531" width="250" height="247" rx="17" class="panel-green"/>
  <text x="1230" y="570" text-anchor="middle" class="node-title">Connected to</text>
  <text x="1230" y="602" text-anchor="middle" class="node-title green">Mag One</text>
  <line x1="1130" y1="620" x2="1330" y2="620" class="rule"/>
  <text x="1130" y="650" class="body">bus edge activates card</text>
  <text x="1130" y="677" class="body">card keeps its own model</text>
  <text x="1130" y="704" class="body">card keeps its own tools</text>
  <text x="1130" y="731" class="body">team is visible and editable</text>
  <path d="M1050 654 L1095 654" class="flow-green"/>

  <rect x="1410" y="520" width="340" height="269" rx="18" class="panel-green" filter="url(#glow-green)"/>
  <text x="1580" y="560" text-anchor="middle" class="node-title">Agent Canvas</text>
  <text x="1580" y="589" text-anchor="middle" class="node-sub green">click the connected-card icon to open</text>
  <line x1="1435" y1="608" x2="1725" y2="608" class="rule"/>
  <rect x="1438" y="627" width="132" height="54" rx="8" fill="#142414" stroke="#78cf46"/>
  <text x="1504" y="650" text-anchor="middle" class="label">controls</text>
  <text x="1504" y="670" text-anchor="middle" class="tiny">orders / actions</text>
  <rect x="1590" y="627" width="132" height="54" rx="8" fill="#142414" stroke="#78cf46"/>
  <text x="1656" y="650" text-anchor="middle" class="label">live views</text>
  <text x="1656" y="670" text-anchor="middle" class="tiny">data / charts</text>
  <rect x="1438" y="696" width="132" height="54" rx="8" fill="#142414" stroke="#78cf46"/>
  <text x="1504" y="719" text-anchor="middle" class="label">simulation</text>
  <text x="1504" y="739" text-anchor="middle" class="tiny">ML / backtests</text>
  <rect x="1590" y="696" width="132" height="54" rx="8" fill="#142414" stroke="#78cf46"/>
  <text x="1656" y="719" text-anchor="middle" class="label">memory</text>
  <text x="1656" y="739" text-anchor="middle" class="tiny">graphs / history</text>
  <text x="1580" y="776" text-anchor="middle" class="small green">UI may be any GitHub repo or custom-coded system</text>
  <path d="M1355 654 L1400 654" class="flow-green"/>

  <!-- Graph layer -->
  <rect x="18" y="836" width="1764" height="398" rx="18" class="lane"/>
  <text x="42" y="868" class="section">3  SEPARATE GRAPH AUTHORITIES + EXECUTABLE AGENT CONTEXT</text>
  <text x="42" y="893" class="small">Cards query the live graph they are granted. AgentGraph carries the exact work program and continuity; it does not copy the other graphs.</text>

  <rect x="42" y="925" width="280" height="250" rx="16" class="panel-cyan"/>
  <text x="182" y="963" text-anchor="middle" class="node-title">ThinkGraph</text>
  <text x="182" y="991" text-anchor="middle" class="node-sub cyan">accepted reasoning</text>
  <text x="67" y="1026" class="body">goals and questions</text>
  <text x="67" y="1053" class="body">options and hypotheses</text>
  <text x="67" y="1080" class="body">simulation comparisons</text>
  <text x="67" y="1107" class="body">decisions and next actions</text>
  <text x="182" y="1150" text-anchor="middle" class="small cyan">Sol reads / writes</text>

  <rect x="347" y="925" width="280" height="250" rx="16" class="panel-purple"/>
  <text x="487" y="963" text-anchor="middle" class="node-title">KnowGraph</text>
  <text x="487" y="991" text-anchor="middle" class="node-sub purple">sourced knowledge</text>
  <text x="372" y="1026" class="body">entities and assertions</text>
  <text x="372" y="1053" class="body">relationships and sources</text>
  <text x="372" y="1080" class="body">time-series observations</text>
  <text x="372" y="1107" class="body">evidence and contradictions</text>
  <text x="487" y="1150" text-anchor="middle" class="small purple">Hermes / research write</text>

  <rect x="652" y="925" width="280" height="250" rx="16" class="panel-orange"/>
  <text x="792" y="963" text-anchor="middle" class="node-title">CodeGraph / CBM</text>
  <text x="792" y="991" text-anchor="middle" class="node-sub orange">what code actually is</text>
  <text x="677" y="1026" class="body">repositories and files</text>
  <text x="677" y="1053" class="body">symbols and calls</text>
  <text x="677" y="1080" class="body">dependencies and tests</text>
  <text x="677" y="1107" class="body">change impact</text>
  <text x="792" y="1150" text-anchor="middle" class="small orange">Coder reads; CBM writes</text>

  <rect x="957" y="909" width="793" height="282" rx="17" class="panel-green"/>
  <text x="1353" y="949" text-anchor="middle" class="node-title">AgentGraph / AGE — Exact Executable Work Context</text>
  <text x="1353" y="977" text-anchor="middle" class="node-sub green">context engineering as a stored, replayable graph program</text>
  <line x1="982" y1="998" x2="1725" y2="998" class="rule"/>

  <text x="988" y="1027" class="label green">STORED CONTEXT PROGRAM</text>
  <text x="988" y="1055" class="body">exact Markdown prompt</text>
  <text x="988" y="1080" class="body">selected graph refs + queries</text>
  <text x="988" y="1105" class="body">Cypher / data-query calls</text>
  <text x="988" y="1130" class="body">math scripts for time series</text>
  <text x="988" y="1155" class="body">sender, receiver, approval</text>

  <path d="M1238 1018 L1238 1164" stroke="#365944" stroke-width="1.5"/>

  <text x="1270" y="1027" class="label green">EXECUTED THROUGH TOOLS</text>
  <text x="1270" y="1055" class="body">native graph query results</text>
  <text x="1270" y="1080" class="body">numerical arrays / indicators</text>
  <text x="1270" y="1105" class="body">charts and numerical views</text>
  <text x="1270" y="1130" class="body">specialist findings + result</text>
  <text x="1270" y="1155" class="body">continuation and lineage</text>

  <path d="M1513 1018 L1513 1164" stroke="#365944" stroke-width="1.5"/>

  <text x="1542" y="1027" class="label green">NOT COPIED KNOWLEDGE</text>
  <text x="1542" y="1055" class="body">Think / Know / Code stay live</text>
  <text x="1542" y="1080" class="body">AgentGraph stores exact calls</text>
  <text x="1542" y="1105" class="body">and the work they produced</text>
  <text x="1542" y="1130" class="body">so another model can resume</text>
  <text x="1542" y="1155" class="body">without invented summaries</text>

  <!-- Graph access and context-result paths -->
  <path d="M182 925 C182 840,800 840,838 778" class="query-cyan"/>
  <path d="M487 925 C487 850,865 848,900 778" class="query-purple"/>
  <path d="M792 925 C792 850,930 844,960 778" class="query-orange"/>
  <path d="M1353 909 C1353 842,1580 842,1580 799" class="query-green"/>

  <path d="M1690 909 C1775 760,1780 445,1125 362" class="query-green"/>
  <text x="1430" y="887" class="small green">results become curated executive views</text>

  <!-- Footer legend -->
  <rect x="18" y="1246" width="1764" height="26" rx="10" fill="#07111a" stroke="#19384b"/>
  <line x1="65" y1="1259" x2="125" y2="1259" stroke="#d9e5eb" stroke-width="2.5" marker-end="url(#arrow-cyan)"/>
  <text x="140" y="1264" class="tiny">solid = work / control / activation</text>
  <line x1="435" y1="1259" x2="495" y2="1259" stroke="#d9e5eb" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#arrow-cyan)"/>
  <text x="510" y="1264" class="tiny">dashed = native graph query, context, or result reference</text>
  <text x="1040" y="1264" class="tiny">Graphs are authorities. Cards are workers. Agent Canvas is the universal operating surface.</text>
</svg>
